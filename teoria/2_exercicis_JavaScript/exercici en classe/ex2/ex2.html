<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise2 en Javascript</title>
</head>
<body>
    <h1>Exemple2 en Javascript</h1>

    <script>
        // let suma;
        // let resta;
        // let multiplicacio;
        // let divisio;

        // Exmple amb les operacions aritmetiques basiques

        let suma, resta, multiplicacio, divisio;

        let numero1 = prompt('Introdueix el primer número:');
        let numero2 = prompt('Introdueix el segon número:');

        resta = Number(numero1) - Number(numero2);
        suma = Number(numero1) + Number(numero2);
        multiplicacio = Number(numero1) * Number(numero2);
        divisio = Number(numero1) / Number(numero2);

        console.log(`El resultat de SUMA ${numero1} i ${numero2} és: ${suma}`);
        console.log(`El resultat de RESTA ${numero1} i ${numero2} és: ${resta}`);
        console.log(`El resultat de la MULTIPLICACIÓ ${numero1} i ${numero2} és: ${multiplicacio}`);
        console.log(`El resultat de la DIVISIÓ ${numero1} i ${numero2} és: ${divisio}`);

    </script>

</body>
</html>
